version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 + TimescaleDB Extension
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: devpulse-postgres
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devpulse -d devpulse" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devpulse

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — Job Queue & Cache
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devpulse

  # ─────────────────────────────────────────────────────────────────────────────
  # FastAPI App (Dev mode with hot reload)
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devpulse-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://devpulse:devpulse@postgres:5432/devpulse
      DATABASE_URL_SYNC: postgresql://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      DEBUG: "1"
      LOG_LEVEL: INFO
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
      # Add other env vars from .env here or use --env-file
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/tests:/app/tests:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devpulse
    command: >
      sh -c " alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port
      8000 --reload "

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Worker — Agent Runs & Background Tasks
  # ─────────────────────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devpulse-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      - postgres
      - redis
    networks:
      - devpulse
    command: >
      sh -c " celery -A app.celery_worker:celery worker --loglevel=info "

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Beat — Scheduled Tasks (Weekly agent runs)
  # ─────────────────────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devpulse-celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://devpulse:devpulse@postgres:5432/devpulse
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      - redis
    networks:
      - devpulse
    command: >
      sh -c " celery -A app.celery_worker:celery beat --loglevel=info "

  # ─────────────────────────────────────────────────────────────────────────────
  # Prometheus — Metrics Collection (Week 4)
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: devpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api
    networks:
      - devpulse

  # ─────────────────────────────────────────────────────────────────────────────
  # Grafana — Metrics Visualization (Week 4)
  # ─────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: devpulse-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - devpulse

  # ─────────────────────────────────────────────────────────────────────────────
  # OpenTelemetry Collector (Week 4)
  # ─────────────────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: devpulse-otel-collector
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel/config.yml:ro
    command: [ "--config=/etc/otel/config.yml" ]
    networks:
      - devpulse

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  devpulse:
    driver: bridge
