version: "3.9"

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 + TimescaleDB Extension
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: devpulse-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devpulse}
      POSTGRES_USER: ${POSTGRES_USER:-devpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432" # Only expose to localhost on the host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devpulse} -d ${POSTGRES_DB:-devpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devpulse-prod

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — Job Queue & Cache
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devpulse-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devpulse-prod

  # ─────────────────────────────────────────────────────────────────────────────
  # FastAPI App
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: devpulse-api-prod
    restart: always
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-devpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpulse}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-devpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpulse}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      DEBUG: "0"
      LOG_LEVEL: WARNING
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devpulse-prod
    # Run migrations then start uvicorn without reload
    command: >
      sh -c "alembic -c alembic/alembic.ini upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────────────────────────────────────
  celery_worker:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: devpulse-celery-worker-prod
    restart: always
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-devpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpulse}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-devpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpulse}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devpulse-prod
    command: celery -A app.celery_worker:celery worker --loglevel=warning --concurrency=4

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Beat
  # ─────────────────────────────────────────────────────────────────────────────
  celery_beat:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: devpulse-celery-beat-prod
    restart: always
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-devpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpulse}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-devpulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpulse}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - devpulse-prod
    command: celery -A app.celery_worker:celery beat --loglevel=warning

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: devpulse-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - devpulse-prod

volumes:
  postgres_data:

networks:
  devpulse-prod:
    driver: bridge
